    <style>
      :root {
        --bg:         #FAF8F4;
        --bg-card:    #FFFFFF;
        --bg-deep:    #F2EDE5;
        --text:       #1C1714;
        --text-mid:   #4A3F38;
        --text-muted: #8C7F77;
        --gold:       #BF912E;
        --gold-light: #D4A84B;
        --gold-bg:    #FBF4E4;
        --border:     #E8E2D9;
        --border-md:  #D5CBBF;
        --dark:       #17120E;
        --dark-2:     #231E1A;
        --dark-3:     #2E2520;
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Nunito Sans', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      h1, h2, h3, .serif { font-family: 'Cormorant Garamond', serif; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-up   { animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) forwards; }
      .fade-up-2 { animation: fadeUp 0.7s 0.14s cubic-bezier(0.22,1,0.36,1) forwards; opacity:0; }
      .fade-up-3 { animation: fadeUp 0.7s 0.28s cubic-bezier(0.22,1,0.36,1) forwards; opacity:0; }
      .fade-up-4 { animation: fadeUp 0.7s 0.42s cubic-bezier(0.22,1,0.36,1) forwards; opacity:0; }

      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      .gold-text {
        background: linear-gradient(90deg, #A87926 0%, #E0C06A 45%, #BF912E 70%, #A87926 100%);
        background-size: 200% auto;
        animation: shimmer 4s linear infinite;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .spin { animation: spin 0.9s linear infinite; }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

      .product-card-img { transition: transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94); }
      .product-card:hover .product-card-img { transform: scale(1.06); }
    </style>
