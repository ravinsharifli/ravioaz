    <style>
      :root {
        --gold:        #C9A84C;
        --gold-2:      #E8C97A;
        --gold-dim:    #7A5E28;
        --gold-bg:     rgba(201,168,76,0.08);
        --gold-border: rgba(201,168,76,0.22);
        --dark:        #0F0D0B;
        --dark-2:      #1A1612;
        --dark-3:      #252019;
        --light:       #FAF8F4;
        --light-2:     #F3EDE4;
        --text-dark:   #1C1714;
        --text-mid:    #5C5048;
        --text-muted:  #9C9088;
        --border-l:    #E5DDD3;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: var(--light);
        color: var(--text-dark);
        -webkit-font-smoothing: antialiased;
      }
      h1, h2, h3, .serif { font-family: 'Cormorant Garamond', serif; }

      @keyframes shimmer {
        0%   { background-position: -300% center; }
        100% { background-position: 300% center; }
      }
      .gold-text {
        background: linear-gradient(90deg, #8B6914 0%, #C9A84C 25%, #F0DC9A 50%, #C9A84C 75%, #8B6914 100%);
        background-size: 300% auto;
        animation: shimmer 6s linear infinite;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(28px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-up   { animation: fadeUp 0.75s cubic-bezier(0.22,1,0.36,1) both; }
      .fade-up-2 { animation: fadeUp 0.75s 0.1s  cubic-bezier(0.22,1,0.36,1) both; }
      .fade-up-3 { animation: fadeUp 0.75s 0.2s  cubic-bezier(0.22,1,0.36,1) both; }
      .fade-up-4 { animation: fadeUp 0.75s 0.3s  cubic-bezier(0.22,1,0.36,1) both; }
      .fade-up-5 { animation: fadeUp 0.75s 0.4s  cubic-bezier(0.22,1,0.36,1) both; }

      @keyframes spin { to { transform: rotate(360deg); } }
      .spin { animation: spin 0.9s linear infinite; }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: var(--light-2); }
      ::-webkit-scrollbar-thumb { background: var(--border-l); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

      .product-card {
        background: #fff;
        border-radius: 20px;
        overflow: hidden;
        cursor: pointer;
        border: 1.5px solid var(--border-l);
        transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
        position: relative;
      }
      .product-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 24px 64px rgba(28,23,20,0.13), 0 2px 8px rgba(201,168,76,0.1);
        border-color: rgba(201,168,76,0.4);
      }
      .product-card-img {
        transition: transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94);
        will-change: transform;
      }
      .product-card:hover .product-card-img { transform: scale(1.09); }
      .card-overlay { opacity: 0; transition: opacity 0.3s ease; }
      .product-card:hover .card-overlay { opacity: 1 !important; }

      .btn-primary {
        background: linear-gradient(135deg, #C9A84C, #E8C97A, #C9A84C);
        background-size: 200%;
        color: #0F0D0B;
        font-weight: 800;
        border: none;
        cursor: pointer;
        font-family: 'Plus Jakarta Sans', sans-serif;
        transition: background-position 0.4s ease, box-shadow 0.3s, transform 0.2s;
      }
      .btn-primary:hover {
        background-position: right center;
        box-shadow: 0 8px 28px rgba(201,168,76,0.45);
        transform: translateY(-2px);
      }

      @keyframes wa-pulse {
        0%, 100% { box-shadow: 0 4px 20px rgba(37,211,102,0.4); }
        50% { box-shadow: 0 4px 32px rgba(37,211,102,0.7); }
      }
      .wa-float { animation: wa-pulse 2.5s ease infinite; }

      @keyframes ticker {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }
      .trust-ticker {
        animation: ticker 28s linear infinite;
        display: flex;
        width: max-content;
      }
      .trust-ticker:hover { animation-play-state: paused; }

      .hero-dots {
        background-image: radial-gradient(circle, rgba(201,168,76,0.13) 1px, transparent 1px);
        background-size: 28px 28px;
      }

      .cat-pill { transition: all 0.2s ease; cursor: pointer; }
      .cat-pill:hover {
        border-color: #C9A84C !important;
        color: #1C1714 !important;
        background: rgba(201,168,76,0.07) !important;
      }
    </style>
